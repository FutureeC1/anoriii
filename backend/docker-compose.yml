version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=luxury_seoul
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/luxury_seoul
      - SECRET_KEY=django-insecure-dev-only
      - DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=VITE_API_URL=https://zestful-betty-baveehub-f85022f4.koyeb.app
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin1
      - ADMIN_EMAIL=admin@example.com
    depends_on:
      - db

volumes:
  postgres_data:
